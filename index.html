
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>NextStepUni: The Learning Lab</title>
    <meta name="theme-color" content="#131311" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <style>
      @font-face {
        font-family: 'Apercu Mono Pro';
        src: url('/fonts/ApercuMonoPro.otf') format('opentype');
        font-weight: 400;
        font-style: normal;
        font-display: swap;
      }
    </style>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;0,8..60,600;0,8..60,700&family=DM+Sans:wght@300;400;500;600;700;800;900&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              zinc: {
                50:  '#FAFAF7',
                100: '#F0F0EB',
                200: '#E5E4DF',
                300: '#BFBFBA',
                400: '#91918D',
                500: '#666663',
                600: '#52524F',
                700: '#40403E',
                800: '#262625',
                900: '#191919',
                950: '#131311',
              },
              accent: {
                DEFAULT: '#CC785C',
                light: '#D98E74',
                dark: '#B56A50',
              },
            },
            fontFamily: {
              serif: ['"Source Serif 4"', 'serif'],
              sans: ['"DM Sans"', 'sans-serif'],
              mono: ['"Roboto Mono"', 'monospace'],
              apercu: ['"Apercu Mono Pro"', '"DM Sans"', 'monospace'],
            },
            keyframes: {
              shine: {
                '0%': { transform: 'translateX(-100%)' },
                '100%': { transform: 'translateX(100%)' },
              },
              'blob-drift-1': {
                '0%, 100%': { transform: 'translate(0, 0) scale(1)' },
                '33%': { transform: 'translate(30px, -50px) scale(1.1)' },
                '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
              },
              'blob-drift-2': {
                '0%, 100%': { transform: 'translate(0, 0) scale(1)' },
                '33%': { transform: 'translate(-40px, 30px) scale(1.05)' },
                '66%': { transform: 'translate(25px, -35px) scale(0.95)' },
              },
              'blob-drift-3': {
                '0%, 100%': { transform: 'translate(0, 0) scale(1)' },
                '33%': { transform: 'translate(25px, 45px) scale(1.08)' },
                '66%': { transform: 'translate(-35px, -25px) scale(0.92)' },
              },
            },
            animation: {
              'blob-1': 'blob-drift-1 20s ease-in-out infinite',
              'blob-2': 'blob-drift-2 25s ease-in-out infinite',
              'blob-3': 'blob-drift-3 18s ease-in-out infinite',
            }
          }
        }
      }
    </script>
    <style>
      html {
        scroll-behavior: smooth;
        scroll-padding-top: 100px;
      }
      body {
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      :root {
        --accent: 204, 120, 92;
        --accent-hex: #CC785C;
        --accent-dark: 181, 106, 80;
        --accent-dark-hex: #B56A50;
        --sat: env(safe-area-inset-top);
        --sar: env(safe-area-inset-right);
        --sab: env(safe-area-inset-bottom);
        --sal: env(safe-area-inset-left);
      }
      @keyframes sectionFadeIn {
        from { opacity: 0; transform: translateY(12px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .section-enter {
        animation: sectionFadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
      }
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
          scroll-behavior: auto !important;
        }
      }
      @media print {
        nav, footer, button {
          display: none !important;
        }
      }
      /* Card style overrides — triggered by data-card-style on <body> */
      /* Glass — dramatic frosted effect */
      body[data-card-style="glass"] .card-styled {
        background: rgba(255, 255, 255, 0.35) !important;
        backdrop-filter: blur(24px) saturate(180%) !important;
        -webkit-backdrop-filter: blur(24px) saturate(180%) !important;
        border: 1px solid rgba(255, 255, 255, 0.3) !important;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08), inset 0 1px 0 rgba(255, 255, 255, 0.4) !important;
      }
      html.dark body[data-card-style="glass"] .card-styled {
        background: rgba(25, 25, 25, 0.4) !important;
        border: 1px solid rgba(255, 255, 255, 0.08) !important;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.05) !important;
      }
      /* Neon — readable with glowing accent borders */
      body[data-card-style="neon"] .card-styled {
        background: white !important;
        border: 2px solid rgba(var(--accent), 0.5) !important;
        box-shadow: 0 0 20px rgba(var(--accent), 0.15), 0 0 60px rgba(var(--accent), 0.05) !important;
      }
      html.dark body[data-card-style="neon"] .card-styled {
        background: #191919 !important;
        border: 2px solid rgba(var(--accent), 0.5) !important;
        box-shadow: 0 0 20px rgba(var(--accent), 0.2), 0 0 60px rgba(var(--accent), 0.08) !important;
      }
      /* Flat — bold accent borders, zero shadows */
      body[data-card-style="flat"] .card-styled {
        background: white !important;
        border: 3px solid rgba(var(--accent), 0.3) !important;
        border-radius: 0.75rem !important;
        box-shadow: none !important;
      }
      html.dark body[data-card-style="flat"] .card-styled {
        background: #191919 !important;
        border: 3px solid rgba(var(--accent), 0.25) !important;
      }
      /* Gradient — subtle accent gradient */
      body[data-card-style="gradient"] .card-styled {
        background: linear-gradient(135deg, white, rgba(var(--accent), 0.08)) !important;
        border: 1px solid rgba(var(--accent), 0.12) !important;
      }
      html.dark body[data-card-style="gradient"] .card-styled {
        background: linear-gradient(135deg, #191919, rgba(var(--accent), 0.12)) !important;
        border: 1px solid rgba(var(--accent), 0.1) !important;
      }
      /* Login page blob animations */
      @keyframes loginBlob1 { 0% { transform: translate(0,0) scale(1); } 33% { transform: translate(100px,-50px) scale(1.1); } 66% { transform: translate(-60px,80px) scale(0.9); } 100% { transform: translate(0,0) scale(1); } }
      @keyframes loginBlob2 { 0% { transform: translate(0,0) scale(1); } 25% { transform: translate(-80px,60px) scale(1.15); } 50% { transform: translate(40px,100px) scale(0.85); } 75% { transform: translate(70px,-40px) scale(1.05); } 100% { transform: translate(0,0) scale(1); } }
      @keyframes loginBlob3 { 0% { transform: translate(0,0) scale(1); } 33% { transform: translate(60px,70px) scale(0.95); } 66% { transform: translate(-90px,-30px) scale(1.1); } 100% { transform: translate(0,0) scale(1); } }
      @keyframes loginBlob4 { 0% { transform: translate(0,0) scale(1); } 50% { transform: translate(-50px,-60px) scale(1.12); } 100% { transform: translate(0,0) scale(1); } }
      .animate-login-blob-1 { animation: loginBlob1 15s ease-in-out infinite; }
      .animate-login-blob-2 { animation: loginBlob2 20s ease-in-out infinite; }
      .animate-login-blob-3 { animation: loginBlob3 25s ease-in-out infinite; }
      .animate-login-blob-4 { animation: loginBlob4 18s ease-in-out infinite; }
    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "@react-three/fiber": "https://aistudiocdn.com/@react-three/fiber@^9.4.0",
    "@react-three/drei": "https://aistudiocdn.com/@react-three/drei@^10.7.7",
    "three": "https://aistudiocdn.com/three@^0.181.1",
    "framer-motion": "https://aistudiocdn.com/framer-motion@^12.23.24",
    "lucide-react": "https://aistudiocdn.com/lucide-react@^0.553.0",
    "firebase/app": "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js",
    "firebase/auth": "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js",
    "firebase/firestore": "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js",
    "firebase/": "https://esm.sh/firebase@^12.8.0/"
  }
}
</script>
</head>
  <body class="bg-zinc-50 text-zinc-900 dark:bg-zinc-950 dark:text-zinc-100 transition-colors duration-500">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
